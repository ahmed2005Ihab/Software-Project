<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
       <div id="page-overlay"></div>

    <header class="header">
        <div class="logo"><a href="{{ url_for('products.home') }}">🏠 HomeCraft</a></div>
        <nav class="nav">
            <a href="{{ url_for('products.home') }}">Home</a>
            <a href="{{ url_for('products.products') }}">Products</a>
            <a href="{{ url_for('auth.register') }}" class="active">Register</a>
        </nav>
        <div class="search-icons">
            <form method="GET" action="{{ url_for('products.products') }}">
                <input type="text" name="search" placeholder="Search furniture...">
                <button type="submit">🔍</button>
            </form>
            <a href="{{ url_for('cart.view_cart') }}"><span class="icon">🛒</span></a>
            <a href="{{ url_for('auth.login') }}"><span class="icon">👤</span></a>
        </div>
    </header>



  <main class="content-container">
   <div class="white-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="page-header">
     <h2 class="page-title">Create Account</h2>
     <p class="page-subtitle">Join HomeCraft community today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
     <div class="form-group">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name" required>
     </div>

     <div class="form-group">
        <label for="Address" class="form-label">Address</label>
        <input type="text" id="Address" name="Address" class="form-input" placeholder="Enter your address" required>
     </div>

     <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
     </div>

     <div class="form-group">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" id="phone" name="phone" class="form-input" placeholder="Enter your phone number" required>
     </div>

     <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required>
     </div>

     <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    
    <p style="font-size: 0.95rem; margin-top: 1.5rem; text-align: center; color: var(--text-medium);">
        Already have an account? 
        <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 600;">Login here</a>
    </p>
</div>
  </main>

</body>
</html>
